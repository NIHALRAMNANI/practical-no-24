<!DOCTYPE html>
<html>
<head><title> Responsive Image Example></title>
<style>
.header{background-color:lightblue;
text-align:center;
padding 10px;}
.content{width:80%;
margin:auto;
text-align:center;}
img{width:80%
height:auto;}
/*Responsive*/
@media(max-width:600px){
body{background-color:lightblue;}
.content{width:80%;}}
</style>
</head>
<body>
<div class="header">
<h2> Responsive Image Example</h2></div>
<div class="content">
<P> This image resize accept to browser width
</p>
<img src="pari.jpg"alt="sample image">
</div>
</body>
</html>
